<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <title>Döwletýar</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e90ff, #00bfff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        h1 {
            font-size: 5em;
            margin: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>See you around, Döwletýar</h1>
    </div>
</body>
</html>
